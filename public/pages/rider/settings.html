<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rider Settings — The Fast Roll</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="nav">
    <div class="logo">
        <img src="/img/Fast-logo.png" class="logo-img" alt="The Fast Roll Logo" />
    </div>
    <div class="nav-links">
        <a href="/index.html#how">How It Works</a>
        <a href="/index.html#order">Order</a>
        <a href="/index.html#riders">Riders</a>
    </div>
</nav>

<div class="form-wrapper">
    <h1>Rider Settings</h1>
    <p>Control your radius and preferences.</p>

    <form id="riderSettingsForm">
        <div class="form-group">
            <label>Radius (miles)</label>
            <input type="number" id="settingsRadius" min="0.5" max="5" step="0.5" />
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="settingsNotifications" />
                Enable job notifications (when supported)
            </label>
        </div>

        <button class="primary-btn" type="submit">Save Settings</button>
        <button class="secondary-btn" type="button" onclick="location.href='/pages/rider/dashboard.html'">
            Back to Dashboard
        </button>
    </form>
</div>

<script src="/js/app.js"></script>
<script src="/js/rider.js"></script>
</body>
</html>
