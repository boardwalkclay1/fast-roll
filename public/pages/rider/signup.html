<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rider Signup — The Fast Roll</title>

    <meta property="og:title" content="Become a Fast Roll Rider" />
    <meta property="og:image" content="../../public/img/fast-index.jpg" />
    <meta property="og:description" content="Sign up to deliver on the Atlanta Beltline." />

    <link rel="stylesheet" href="../../css/style.css" />
</head>

<body>

    <nav class="nav">
        <div class="logo">THE FAST ROLL</div>
        <div class="nav-links">
            <a href="../../index.html">Home</a>
        </div>
    </nav>

    <main class="form-wrapper">
        <h1>Become a Rider</h1>
        <p>Longboard, skate, e‑bike, or OneWheel? Earn fast payouts delivering small items along the Beltline.</p>

        <form id="riderSignupForm">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" type="text" placeholder="Your full name" required />
            </div>

            <div class="form-group">
                <label for="vehicle">What do you ride?</label>
                <select id="vehicle" required>
                    <option value="">Select one</option>
                    <option value="longboard">Longboard</option>
                    <option value="skateboard">Skateboard</option>
                    <option value="ebike">Electric Bike</option>
                    <option value="onewheel">OneWheel</option>
                </select>
            </div>

            <div class="form-group">
                <label for="paypal">PayPal Email (for payouts)</label>
                <input id="paypal" type="email" placeholder="you@paypal.com" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" required />
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input id="confirm" type="password" required />
            </div>

            <div class="form-group">
                <label style="display:flex; gap:10px; align-items:center;">
                    <input id="terms" type="checkbox" required />
                    I agree to the rider rules & safety guidelines.
                </label>
            </div>

            <button class="primary-btn" type="submit">Create Rider Account</button>

        </form>
    </main>

    <script src="../../js/app.js"></script>
</body>
</html>
