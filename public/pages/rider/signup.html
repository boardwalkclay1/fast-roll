<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rider Signup — The Fast Roll</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="nav">
    <div class="logo">
        <img src="/img/Fast-logo.png" class="logo-img" alt="The Fast Roll Logo" />
    </div>
    <div class="nav-links">
        <a href="/index.html#how">How It Works</a>
        <a href="/index.html#order">Order</a>
        <a href="/index.html#riders">Riders</a>
    </div>
</nav>

<div class="form-wrapper">
    <h1>Become a Rider</h1>
    <p>Longboarders, skaters, e‑bikes, OneWheels — roll the Beltline and get paid.</p>

    <form id="riderSignupForm">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" required />
        </div>

        <div class="form-group">
            <label>Vehicle</label>
            <select id="vehicle">
                <option value="longboard">Longboard</option>
                <option value="skateboard">Skateboard</option>
                <option value="ebike">E‑Bike</option>
                <option value="onewheel">OneWheel</option>
            </select>
        </div>

        <div class="form-group">
            <label>PayPal Email</label>
            <input type="email" id="paypal" required />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required />
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm" required />
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="terms" />
                I agree that I ride at my own risk and The Fast Roll is not liable.
            </label>
        </div>

        <button class="primary-btn" type="submit">Create Rider Account</button>
    </form>
</div>

<script src="/js/app.js"></script>
</body>
</html>
